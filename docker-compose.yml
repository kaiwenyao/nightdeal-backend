services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nightdeal
      POSTGRES_PASSWORD: nightdeal
      POSTGRES_DB: nightdeal
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nightdeal']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://nightdeal:nightdeal@postgres:5432/nightdeal
      REDIS_URL: redis://redis:6379
      UPLOAD_BASE_URL: ${UPLOAD_BASE_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  redisdata:
  uploads:
